name: AI Code Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  review:
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      # SECURITY: Always checkout the BASE branch, never the PR head.
      # This workflow uses `gh pr diff` to read changes — it never executes PR code.
      # This is critical for fork PRs: pull_request_target has secret access,
      # so checking out untrusted PR code would be a security vulnerability.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: op://Dev/CLAUDE_CODE_OAUTH_TOKEN/credential

      - name: AI Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pass GitHub token explicitly to bypass OIDC token exchange,
          # which rejects pull_request_target events.
          # See: https://github.com/anthropics/claude-code-action/issues/713
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a code reviewer for the copilot-money-mcp project.

            REPO: ${{ github.repository }}
            PR: #${{ github.event.pull_request.number }}

            ## Instructions

            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` for PR metadata.
            3. Read any source files you need for additional context using the Read tool.
            4. Analyze the changes with focus on:
               - **Code Quality** — Clean code, error handling, readability
               - **Security** — Vulnerabilities, input validation, data privacy
               - **Performance** — Bottlenecks, memory leaks, efficient data access
               - **Testing** — Coverage, edge cases, test quality
               - **TypeScript** — Proper typing, no `any` abuse, type safety
               - **MCP Protocol** — Correct tool definitions, proper server implementation
               - **Data Privacy** — No logging of sensitive financial data
            5. Draft your ENTIRE review internally before posting anything.
            6. Post exactly ONE summary comment using `gh pr comment ${{ github.event.pull_request.number }}`.

            ## Comment format

            Your single summary comment must use this structure:

            ```
            ## AI Code Review — PR #<number>: <title>

            ### Overall Assessment
            <1-2 sentence summary>

            ### Issues Found
            For each issue:
            - **[severity]** `file:line` — <description>
              **Fix:** <brief suggestion or code snippet>

            ### Good Patterns
            <brief praise for well-written code>
            ```

            ## CRITICAL RULES — read carefully

            - Post EXACTLY ONE comment. Do NOT post multiple comments.
            - Do NOT post test messages, drafts, or experimental comments.
            - Do NOT post file contents (CLAUDE.md, CONTRIBUTING.md, etc.) as comments.
            - Do NOT iterate on comment formatting by posting multiple versions.
            - Draft the full review in your reasoning, then post the final version once.
            - If the PR has no issues, still post one summary comment saying so.
            - Be constructive. Praise good patterns too.

          # SECURITY: Allow read-only gh commands and commenting — block approve/merge
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(gh pr comment*),Bash(gh pr diff*),Bash(gh pr view*),Read,Grep,Glob"
            --disallowedTools "Bash(gh pr review --approve*),Bash(gh pr merge*),Bash(gh pr close*)"
